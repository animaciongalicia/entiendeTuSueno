# .github/workflows/generate-post.yml
# Genera un post nuevo automáticamente con Claude API
# Se ejecuta 3 veces por semana o manualmente

name: 🤖 Auto-generar post del blog

on:
  schedule:
    # Lunes, miércoles y viernes a las 9:00 AM (hora Madrid = UTC+1 en invierno, UTC+2 verano)
    # Ajusta el horario: 8:00 UTC = 9:00 Madrid (invierno) / 10:00 (verano si quieres)
    - cron: "0 8 * * 1,3,5"

  # Permite lanzarlo a mano desde GitHub → Actions → Run workflow
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Solo ver qué post se generaría, sin publicar"
        required: false
        default: "false"
        type: boolean

jobs:
  generate-post:
    name: Generar y publicar post
    runs-on: ubuntu-latest

    # Permiso para hacer commit y push
    permissions:
      contents: write

    steps:
      # 1. Descarga el código del repo
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Configura Node.js 20
      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Instala las dependencias del proyecto
      # @anthropic-ai/sdk ya está en dependencies — npm ci lo instala automáticamente
      - name: 📦 Instalar dependencias
        run: npm ci

      # 4. Ejecuta el script generador (con tu API key secreta)
      - name: 🤖 Generar post con Claude
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/generate-post.js

      # 6. Verifica que el TypeScript sigue siendo válido
      - name: ✅ Verificar TypeScript
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npx tsc --noEmit

      # 7. Hace commit y push del nuevo artículo
      - name: 📤 Commit y push del nuevo post
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Comprueba si hay cambios (puede que el post ya existiera)
          if git diff --quiet src/lib/articles.ts; then
            echo "No hay cambios que commitear (el post ya existía o hubo un error)"
            exit 0
          fi

          git add src/lib/articles.ts
          git commit -m "feat: auto-post $(date +%Y-%m-%d) [skip ci]"
          git push origin HEAD

      # 8. (Dry run) Muestra el siguiente post que se generaría sin publicar nada
      - name: 🔍 Dry run — ver post pendiente
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "=== MODO DRY RUN — próximo post a publicar ==="
          node -e "
            const fs = require('fs');
            const path = require('path');
            const script = fs.readFileSync('.github/scripts/generate-post.js', 'utf8');

            // Extraer PENDING_POSTS sin ejecutar main()
            const pendingMatch = script.match(/const PENDING_POSTS = (\[[\s\S]*?\n\];)/);
            if (!pendingMatch) { console.log('No se pudo leer PENDING_POSTS'); process.exit(0); }

            const PENDING_POSTS = eval(pendingMatch[1]);
            const articles = fs.readFileSync('src/lib/articles.ts', 'utf8');

            function slugify(t) {
              return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-');
            }

            let found = null;
            let skipped = 0;
            for (const p of PENDING_POSTS) {
              const slug = slugify(p.title);
              if (!articles.includes('slug: \"' + slug + '\"')) { found = p; break; }
              skipped++;
            }

            if (!found) {
              console.log('Todos los posts ya publicados. Añade más a PENDING_POSTS.');
            } else {
              const remaining = PENDING_POSTS.slice(PENDING_POSTS.indexOf(found)).length;
              console.log('Posts ya publicados de la lista: ' + skipped);
              console.log('Posts restantes en cola:         ' + remaining);
              console.log('');
              console.log('Próximo post:');
              console.log('  Título:    ' + found.title);
              console.log('  Categoría: ' + found.category);
              console.log('  Slug:      ' + slugify(found.title));
              console.log('  Tags:      ' + found.tags.join(', '));
            }
          "
